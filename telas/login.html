<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fin Family</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <img class="background" src="../public/imagens/Fundo.png" alt="background">

    <!-- Tela 1 -->
    <div class="card tela tela1 active">
      <!-- Switch -->
      <div class="switch" id="switchTela"></div>

      <h1 class="title">Fin Family</h1>

      <img class="logo-secundaria" src="../public/imagens/porquinho.png" alt="Logo">

      <div class="input-wrapper">
        <input type="email" placeholder="Digite seu e-mail">
        <span class="icon email-icon"></span>
      </div>

      <div class="input-wrapper">
        <input type="password" placeholder="Digite sua senha">
        <span class="icon senha-icon"></span>
      </div>

      <button class="btn entrar">Entrar</button>
      <button class="btn criar">Criar conta</button>

      <a href="#" class="forgot">Esqueceu a senha?</a>
    </div>

    <!-- Tela 2 -->
    <div class="card tela tela2">
      <!-- Switch -->
      <div class="switch" id="switchTela2"></div>

      <h1 class="title">Fin Family</h1>

      <img class="logo-secundaria" src="../public/imagens/porquinho.png" alt="Logo">

      <div class="input-wrapper">
        <input type="text" placeholder="Digite o código de acesso">
        <span class="icon senha-icon"></span>
      </div>

      <button class="btn entrar">Entrar</button>
    </div>
  </div>

  <script src="../script/script.js"></script>
</body>
</html>
